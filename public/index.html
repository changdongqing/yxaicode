<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意心Code - yxcode</title>
<link rel="icon" type="image/x-icon" href="https://ccnetcore.com/prod-api/wwwroot/codelogo.png">
<link rel="shortcut icon" type="image/x-icon" href="https://ccnetcore.com/prod-api/wwwroot/codelogo.png">
<link id="hljs-theme" rel="stylesheet" href="/vendor/github-dark.min.css">
<link rel="stylesheet" href="/styles.css">
<script>
  // Apply theme before page renders to avoid flash
  (function() {
    var t = localStorage.getItem('yxcode_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
    if (t === 'light') {
      document.addEventListener('DOMContentLoaded', function() {
        var l = document.getElementById('hljs-theme');
        if (l) l.href = '/vendor/github.min.css';
      });
    }
  })();
</script>
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/highlight.min.js"></script>
<script src="/vendor/diff-match-patch.min.js"></script>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <span>会话列表</span>
      <div style="display:flex;gap:4px;">
        <button id="locateSessionBtn" class="btn-icon" title="定位当前会话">📍</button>
        <button id="newSessionSideBtn" class="btn-icon" title="新建会话">＋</button>
        <button id="sidebarCloseBtn" class="btn-icon" title="收起侧栏">◀</button>
      </div>
    </div>
    <div style="padding:6px 8px;border-bottom:1px solid var(--border-primary)">
      <input id="sidebarSearch" type="text" placeholder="搜索目录..." style="width:100%;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-primary);border-radius:var(--radius-md);padding:4px 8px;font-size:12px;outline:none;" />
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
  </aside>
  <div id="sidebarResizeHandle" class="panel-resize-handle"></div>

  <!-- Main Area -->
  <div id="mainArea">
  <header id="header">
    <div class="header-left">
      <button id="sidebarToggle" class="btn-icon" title="会话列表">☰</button>
      <a href="https://yxai.chat" target="_blank" rel="noopener noreferrer" class="logo" title="访问意心AI官网">意心Code</a><span class="version" id="appVersion">v-</span>
    </div>
    <div class="header-center">
      <div class="model-select-wrapper">
        <div id="modelSelectDisplay" class="model-select-display">
          <img class="model-icon" src="" alt="" style="display:none;">
          <span class="model-label">选择模型</span>
          <span class="model-arrow">▼</span>
        </div>
        <div id="modelSelectDropdown" class="model-select-dropdown"></div>
      </div>
      <select id="permSelect">
        <option value="default">默认权限</option>
        <option value="acceptEdits">自动接受编辑</option>
        <option value="bypassPermissions">跳过所有权限</option>
        <option value="plan">计划模式</option>
      </select>
      <label class="switch-wrapper" title="开启后AI会以温柔体贴的女友角色回复">
        <span class="switch-label">💕 女友模式</span>
        <label class="switch">
          <input type="checkbox" id="girlfriendMode">
          <span class="switch-slider"></span>
        </label>
      </label>
    </div>
    <div class="header-right">
      <button id="fullscreenBtn" class="btn-icon btn-fullscreen" title="全屏" aria-label="全屏">
        <!-- Expand icon: shown when not fullscreen -->
        <svg id="fullscreenIconExpand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <!-- Compress icon: shown when fullscreen -->
        <svg id="fullscreenIconCompress" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
      </button>
      <button id="themeToggleBtn" class="btn-icon btn-theme" title="切换主题" aria-label="切换主题">
        <!-- Sun icon: shown in dark mode -->
        <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <!-- Moon icon: shown in light mode -->
        <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button id="settingsBtn" class="btn-settings" title="设置">⚙ 设置</button>
      <a href="https://github.com/ccnetcore/yxaicode" target="_blank" rel="noopener noreferrer" class="github-link" title="GitHub">
        <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
      <span id="connStatus" class="status-dot offline" title="未连接"></span>
    </div>
  </header>
  <div id="subToolbar" class="sub-toolbar">
    <label class="cwd-label">工作目录</label>
    <div class="cwd-input-wrapper">
      <input id="cwdInput" type="text" placeholder="项目路径..." />
      <div id="cwdDropdown" class="cwd-dropdown"></div>
    </div>
    <button id="cwdOpenBtn" class="btn-browse" title="打开目录">📁 打开</button>
    <button id="cwdBrowseBtn" class="btn-browse" title="浏览文件夹">📂 浏览</button>
    <button id="filePanelToggle" class="btn-icon file-toggle" title="文件浏览"><span class="toggle-arrow">▶</span></button>
  </div>
  <!-- Settings -->
  <div id="settingsOverlay" class="settings-overlay hidden">
    <div class="settings-panel">
      <h2>⚙ 设置</h2>
      <div class="sg">
        <label>供应商</label>
        <select id="setProvider" style="width:100%;padding:8px;background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border-primary);border-radius:var(--radius-md);font-size:14px;outline:none;">
          <option value="yxai">意心AI</option>
          <option value="zhipu">智谱清言</option>
        </select>
        <div class="hint" id="providerHint">意心AI - 使用 yi- 开头的 API Key</div>
      </div>
      <div class="sg"><label>API Key</label><div class="apikey-input-row"><input id="setApiKey" type="password" placeholder="yi-xxxxx..." /><button id="copyApiKeyBtn" class="btn-icon" title="复制 API Key">📋</button></div><div class="hint" id="apiKeyHint">请输入API Key（意心AI ApiKey yi- 开头）</div></div>
      <div class="sg">
        <label>模型</label>
        <div class="model-search-wrapper" style="width:100%;">
          <div class="model-search-input-row">
            <input id="setModelSearch" type="text" placeholder="搜索或输入自定义模型ID，回车添加..." autocomplete="off" />
          </div>
          <div id="setModelDropdown" class="model-select-dropdown model-search-dropdown"></div>
        </div>
      </div>
      <!-- 高级设置（折叠） -->
      <div class="sg advanced-settings-group">
        <div class="advanced-toggle" id="advancedToggle">
          <span class="advanced-arrow">▶</span>
          <label>高级设置</label>
        </div>
        <div class="advanced-content hidden" id="advancedContent">
          <div class="sg">
            <label>Base URL</label>
            <div class="base-url-row">
              <input id="setBaseUrl" type="text" placeholder="https://yxai.chat" />
              <button id="testBaseUrlBtn" class="btn-secondary btn-test">测试</button>
            </div>
            <div class="hint">API 服务地址，留空则使用默认地址 https://yxai.chat</div>
            <div id="testResult" class="test-result"></div>
          </div>
        </div>
      </div>
      <div class="sg">
        <label>权限管理</label>
        <div id="permissionList" class="permission-list"></div>
        <div class="permission-actions">
          <button id="clearPermissionsBtn" class="btn-secondary" style="width:100%;">清除所有权限</button>
        </div>
        <div class="hint" id="permissionCount">已记住 0 条权限规则</div>
      </div>
      <div class="settings-footer"><span id="settingsSaved" class="settings-saved">已保存</span><button id="settingsSaveBtn" class="btn-primary">保存</button><button id="settingsCloseBtn" class="btn-settings">关闭</button></div>
    </div>
  </div>
  <main id="chatArea"><div id="messages"></div><div id="permBanner" class="hidden"></div></main>
  <footer id="inputArea">
    <div id="cmdDropdown" class="cmd-dropdown"></div>
    <div id="inputResizeHandle" class="input-resize-handle"></div>
    <div id="imagePreviewBar" class="image-preview-bar" style="display:none;"></div>
    <div class="input-row">
      <textarea id="promptInput" rows="3" placeholder="输入消息... (Enter 发送, Shift+Enter 换行, / 命令, @ 文件, 可粘贴图片)"></textarea>
      <div class="btn-col">
        <button id="sendBtn" class="btn-primary">发送</button>
        <button id="abortBtn" class="btn-danger hidden">停止</button>
        <button id="newBtn" class="btn-secondary">新会话</button>
      </div>
    </div>
    <div class="input-footer"><span id="sessionInfo"></span></div>
  </footer>
  </div><!-- end #mainArea -->
  <div id="filePanelResizeHandle" class="panel-resize-handle"></div>

  <!-- File Panel -->
  <aside id="filePanel">
    <div class="filepanel-header">
      <span>工作目录浏览</span>
      <button id="fileRefreshBtn" class="btn-icon" title="刷新">🔄</button>
    </div>
    <div class="filepanel-hint">💡 支持拖动文件到对话输入框</div>
    <div class="filepanel-body" id="fileTreeBody"></div>
  </aside>
</div>

<!-- Folder Browser Modal -->
<div id="folderBrowser" class="folder-overlay hidden">
  <div class="folder-panel">
    <div class="folder-header">
      <span class="folder-path" id="fbPath"></span>
      <button id="fbCloseBtn" class="btn-icon" title="关闭">✕</button>
    </div>
    <div class="folder-body" id="fbBody"></div>
    <div class="folder-footer">
      <button id="fbSelectBtn" class="btn-primary">选择当前目录</button>
      <button id="fbCancelBtn" class="btn-secondary">取消</button>
    </div>
  </div>
</div>

<!-- File Viewer Modal -->
<div id="fileViewer" class="file-viewer-overlay hidden">
  <div class="file-viewer-panel">
    <div class="file-viewer-header">
      <span class="fv-path" id="fvPath"></span>
      <div>
        <button id="fvInsertBtn" class="btn-primary" title="插入选中行号到输入框" disabled>插入选中行号</button>
        <button id="fvCopyBtn" class="btn-icon" title="复制选中行号" disabled>📋</button>
        <button id="fvCloseBtn" class="btn-icon" title="关闭">✕</button>
      </div>
    </div>
    <div class="file-viewer-content"><pre id="fvContent"></pre></div>
  </div>
</div>

<!-- BTW 快速补充浮动面板 -->
<div id="btwPanel" class="btw-overlay hidden">
  <div class="btw-panel">
    <div class="btw-header">
      <span class="btw-title">💬 /btw 快速补充</span>
      <button id="btwCloseBtn" class="btn-icon" title="关闭">✕</button>
    </div>
    <div class="btw-question"><span class="btw-q-label">你问：</span><span id="btwQuestion"></span></div>
    <div class="btw-content" id="btwContent"></div>
    <div class="btw-footer">
      <span id="btwStatus" class="btw-status">思考中...</span>
      <button id="btwCopyBtn" class="btn-icon" title="复制回答">📋</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
